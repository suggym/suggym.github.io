  <!-- Mia Sugiyanto Interactive Media A1: WEBSITE PICKED TO REVIEW/ANALYSE-Luniverse https://www.luni.app/

 WEBSITE DESIGN SUMMARY: Overall for the website I wanted to create a distant cousin to the Luniverse website in terms of visual style, using a similar font and accent purples/pinks but darker tones overall. 
 Other than that given I don't have any javascript knowledge my main focus was to try and maintain both visual and interctive clarity, the latter of the two being the move difficult task. 
 I went with a very simple visual style and very common website elements (header, nav bar, content, footer), as it was my first website ever, in order to show off core concepts, such as grids, flexboxes, classes and id's without too much visual or word clutter. 
 For interactive elements I created three pages, separating the questions into an initial impressions section and an interpretation section to break up the information more. 
 I also added a gallery for clarity on the visuals of the website, and added short hover dropdown annotations.
 Links were given a 'navbutton' class so they would go semi-transparent on hover and be underlined, and a back to top button to make navigation easier.

 ICONS: Home button icon and back to top icon from Canva- I thought the icons read better visually rather than adding more words to an already necessarily wordy website- 
 as there are not many visual assets I can add. -->
