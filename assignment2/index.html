<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lofistudy: home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- Header Section- title of website + little book icon -->
    <header>
      <h1>l o f i - s t u d y</h1>
      <img
        src="https://img.icons8.com/?size=100&id=veBrHUuf2tai&format=png&color=000000"
        alt="Book"
        height="20px"
      />
    </header>
    <!--study timer-->
    <div class="timer">
      <img
        src="https://img.icons8.com/?size=100&id=655LnEUAFYvk&format=png&color=000000"
        alt="Timer"
        height="30px"
      />

      <!--The Pomodoro Technique is a time management method that many people use for study developed in the late 1980s by Francesco Cirillo that boosts productivity by breaking work into 25-minute, highly focused intervals called "pomodoros," separated by 5-minute breaks. This is why the timer is set for 25min study intervals with a silent alert.-->
      <p id="timer-display">25:00</p>

      <button id="timer-start-btn">start</button>

      <button id="timer-reset-btn">reset</button>
    </div>
    <!--album cover and skip song fucntions- added in case they dislike or find distracting whatever is playing (can also use L/R arrow keys to skip song). Ideally in a more developed version of this the playlist would be much-->
    <section>
      <button class="body-btn" id="previous-song-btn">
        <img
          src="https://img.icons8.com/?size=100&id=1uR18UuFyYv6&format=png&color=000000"
          alt="Previous Song"
        />
      </button>
      <img id="album-cover" src="erokia.png" alt="Album Cover" height="400" />
      <button class="body-btn" id="next-song-btn">
        <img
          src="https://img.icons8.com/?size=100&id=noGWilUx0lyp&format=png&color=000000"
          alt="Next Song"
        />
      </button>
    </section>
    <!-- media player-->
    <div class="media-player">
      <audio id="custom-audio-player">
        <source src="erokia.mp3" type="audio/mp3" />
      </audio>
      <!--buttons: I have decided to include play pause, mute, display the current/full duration of song, skip/go back 10 sec and toggle loop as well as having it autoplay next. This is designed to give maximum control to the user, whilst still allowing hands off studying. -->
      <article>
        <div class="custom-controls">
          <button id="muted-btn">
            <img
              id="muted-img"
              src="https://img.icons8.com/?size=100&id=IlvXrZQW2plu&format=png&color=000000"
              alt="Mute Button"
            />
          </button>

          <button id="play-pause-btn">
            <img
              id="play-pause-img"
              src="https://img.icons8.com/?size=100&id=5GnFrcQmc9iB&format=png&color=000000"
              alt="Play Button"
            />
          </button>

          <div class="progress-bar">
            <div id="progress-bar-fill"></div>
          </div>

          <h3 id="time-display">0:00 | 0:00</h3>

          <button id="loop-btn">
            <img
              id="loop-img"
              src="https://img.icons8.com/?size=100&id=N2IrhI7SMhXo&format=png&color=000000"
              alt="Loop Button"
            />
          </button>

          <button id="back5sec-btn">
            <img
              id="back5sec-img"
              src="https://img.icons8.com/?size=100&id=qDTzh8wHGeQ6&format=png&color=000000"
              alt="Skip Button"
            />
          </button>
          <button id="skip5sec-btn">
            <img
              id="skip5sec-img"
              src="https://img.icons8.com/?size=100&id=FrBED5JqeqRF&format=png&color=000000"
              alt="Skip Button"
            />
          </button>
        </div>
      </article>
    </div>

    <!--background video: rain to calm and create a peaceful space-->
    <video autoplay muted loop id="myVideo">
      <source src="bgvideo.mp4" type="video/mp4" />
    </video>

    <!-- Footer Section -->
    <footer>
      <p>&copy; 2026 lofistudy. All rights reserved.</p>

        >Iconikmg</a

      from

      >
      Close by

      >
      from

  </body>
</html>
