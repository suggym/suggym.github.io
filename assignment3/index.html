<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>your digital closet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Space+Grotesk&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <header><h1>your digital closet</h1></header>
  <!--rack-->
  <div class="shirtrack">
    <div class="shirthang">
      <img src="assets/shirt1hang.png" alt="Orange Crop" />
    </div>
    <div class="shirthang">
      <img src="assets/shirt2hang.png" alt="Black Mesh Shirt" />
    </div>
    <div class="shirthang">
      <img src="assets/shirt3hang.png" alt="Red Shirt" />
    </div>
    <div class="shirthang">
      <img src="assets/shirt4hang.png" alt="Maroon Top" />
    </div>
    <div class="shirthang">
      <img src="assets/shirt5hang.png" alt="Blue Top" />
    </div>
    <div class="shirthang">
      <img src="assets/shirt6hang.png" alt="Red Crop" />
    </div>
  </div>

  <div class="pantsrack">
    <div class="pantshang">
      <img src="assets/pants1hang.png" alt="Black Jeans" />
    </div>
    <div class="pantshang">
      <img src="assets/pants2hang.png" alt="Striped Pants" />
    </div>
    <div class="pantshang">
      <img src="assets/pants3hang.png" alt="Biker shorts" />
    </div>
    <div class="pantshang">
      <img src="assets/pants4hang.png" alt="Gingham Skirt" />
    </div>
    <div class="pantshang">
      <img src="assets/pants5hang.png" alt="Blue Jeans" />
    </div>
  </div>
  <div class="shoebuttons">
    <div class="shoerack">
      <img src="assets/shoes1.png" alt="Brown Boots" />
    </div>
    <div class="shoerack">
      <img src="assets/shoes2.png" alt="Brown Loafers" />
    </div>
    <div class="shoerack">
      <img src="assets/shoes3.png" alt="Black Sneakers" />
    </div>
  </div>

  <!--main character-->
  <div class="outfit-stack">
    <div class="skin" id="skinbox">
      <img src="assets/skin2.png" alt="Skin" />
    </div>
    <div class="shoes" id="shoesbox">
      <img src="assets/shoes1.png" alt="Shoes" />
    </div>
    <div class="pants" id="pantsbox">
      <img src="assets/pants1.png" alt="Pants" />
    </div>
    <div class="shirt" id="shirtbox">
      <img src="assets/shirt1.png" alt="Shirt" />
    </div>
    <div class="hair" id="hairbox">
      <img src="assets/hair1.png" alt="Hair" />
    </div>
  </div>
  <!-- hair/skin buttons-->

  <div class="hairbutton"><img src="assets/hair2.png" alt="Hair" /></div>

  <div class="skinbutton">
    <div onclick="change('skin1')" class="skinswatch">
      <img src="assets/skin1button.png" alt="Light Skin" />
    </div>
    <div onclick="change('skin2')" class="skinswatch">
      <img src="assets/skin2button.png" alt="Medium Skin" />
    </div>
    <div onclick="change('skin3')" class="skinswatch">
      <img src="assets/skin3button.png" alt="Dark Skin" />
    </div>
  </div>

  <footer>footer + credits</footer>
</html>
